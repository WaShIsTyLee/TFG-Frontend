<ion-header>
  <ion-toolbar>
    <ion-title>Iniciar sesión</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <div class="content-wrapper">
    <!-- Imagen en la parte superior -->
    <img src="assets/img/login-icon.png" alt="Icono de inicio" class="login-icon" />

    <ion-item>
      <ion-label position="floating">Usuario</ion-label>
      <ion-input [(ngModel)]="username" type="text" required></ion-input>
    </ion-item>

    <ion-item>
      <ion-label position="floating">Contraseña</ion-label>
      <ion-input [(ngModel)]="password" [type]="passwordType" required></ion-input>
      <ion-icon
        slot="end"
        [name]="passwordType === 'password' ? 'eye-off' : 'eye'"
        (click)="togglePassword()"
        style="cursor: pointer;"
      ></ion-icon>
    </ion-item>

    <ion-button expand="full" (click)="login()">Iniciar sesión</ion-button>
    <ion-button expand="full" (click)="register()">Registrarse</ion-button>

    <ion-text color="danger" *ngIf="errorMessage">
      <p>{{ errorMessage }}</p>
    </ion-text>
  </div>
</ion-content>
